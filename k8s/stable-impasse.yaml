apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-impasse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stable-impasse
  template:
    metadata:
      labels:
        app: stable-impasse
    spec:
      containers:
        - name: stable-impasse
          image: bacteria/stable-impasse:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8000
              name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: stable-impasse
spec:
  selector:
    app: stable-impasse
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: metrics
      port: 8000
      targetPort: 8000
