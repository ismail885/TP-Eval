apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: bacteria/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: STABLE_VIVANT_ADDR
              value: "stable-vivant:50051"
            - name: HYPERTROPHIE_ADDR
              value: "hypertrophie:50051"
            - name: ATROPHIE_ADDR
              value: "atrophie:50051"
            - name: STABLE_IMPASSE_ADDR
              value: "stable-impasse:50051"
            - name: PERSISTENCE_ADDR
              value: "persistence:50051"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30080
